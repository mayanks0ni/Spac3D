version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spac3d-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot-reload in dev
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spac3d-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  huggingface_cache:
  torch_cache:
